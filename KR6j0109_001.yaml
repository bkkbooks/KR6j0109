body:
  text: 西天中印度摩伽陀國那爛陀寺傳教大師三藏賜紫沙門臣法天奉詔譯如是我聞一時世尊在舍衛國祇樹給孤獨園與大苾芻衆千二百五十人俱皆是漏盡意解無復煩惱逮得己利心善解脫衆所知識大阿羅漢復有智慧廣大功德莊嚴威儀具足諸尊菩薩摩訶薩等為聞法故皆悉來集於衆會中有大慧妙吉祥菩薩摩訶薩而為上首爾時釋迦牟尼佛愍念未來世中一切短命衆生令增壽命得大利益為說不可思議祕密甚深微妙勝法是時世尊告大慧妙吉祥菩薩言汝等諦聽從是南閻浮提西方過無量佛土有世界名無量功德藏國土嚴麗衆寶間飾清淨殊勝安隱快樂超過十方微妙第一於彼無量功德藏世界之中有佛名無量壽決定光明王如來無上正等菩提今現住彼世界之中起大慈悲為諸衆生演說妙法令獲殊勝利益安樂佛復告妙吉祥菩薩言今此閻浮提世界中人壽命百歲於中多有造諸惡業而復中夭妙吉祥菩薩若有衆生得見此無量壽決定光明王如來陀羅尼經功德殊勝及聞名號若自書寫若教他人書是經竟或於自舍宅或於高樓或安精舍殿堂之中受持讀誦遵奉禮拜種種妙華燒香粖香塗香華鬘等供養無量壽決定光明王如來陀羅尼經如是短壽之人若能志心書寫受持讀誦供養禮拜如是之人復增壽命滿於百歲復次妙吉祥菩薩若有衆生聞是無量壽決定光明王如來名號若能志心稱念一百八遍如此短命衆生復增壽命或但聞其名號志心信受遵崇之者是人亦得增益壽命復次妙吉祥菩薩若有恆時心無暫捨志誠思求妙法善男子善女人等汝應諦聽我今為說無量壽決定光明王如來一百八名陀羅尼曰曩謨引婆去誐嚩無可反帝阿播哩弭跢引愈轉舌霓野二合曩素上尾𡫸寧吉反室止二合怛帝𭉷仁祖反囉引惹仁佐反野怛他引誐哆引野引囉賀二合帝三去麼藥二合訖三二合沒馱引野怛儞也二合他去唵引薩慱舌呼嚩無可反僧塞迦二合引囉波哩舜馱達他割反㗚麼二合帝誐誐曩三去母努蘖二合帝娑嚩二合短呼婆去引嚩尾舜弟麼賀引曩野波哩嚩引黎娑嚩二合引賀引妙吉祥菩薩此無量壽決定光明王如來一百八名陀羅尼若有人躬自書寫或教他人書是陀羅尼安置高樓之上或殿堂內清淨之處如法嚴飾種種供養短命之人復得長壽滿足百歲如是之人於後此處命終便得往生於彼無量壽決定光明王如來佛剎無量功德藏世界之中當釋迦牟尼佛說此無量壽決定光明王如來陀羅尼經時有九十九俱胝佛一心異口同音亦說此無量壽決定光明王如來陀羅尼經是時復有八十四俱胝佛一心異口同音亦說此無量壽決定光明王如來陀羅尼經是時復有七十七俱胝佛一心異口同音亦說此無量壽決定光明王如來陀羅尼經是時復有六十六俱胝佛一心異口同音亦說此無量壽決定光明王如來陀羅尼經是時復有五十五俱胝佛一心異口同音亦說此無量壽決定光明王如來陀羅尼經是時復有四十四俱胝佛一心異口同音亦說此無量壽決定光明王如來陀羅尼經是時復有三十六俱胝佛一心異口同音亦說此無量壽決定光明王如來陀羅尼經是時復有二十五俱胝佛一心異口同音亦說此無量壽決定光明王如來陀羅尼經是時復有十殑伽河沙數俱胝佛各各心無差別異口同音亦皆說此無量壽決定光明王如來陀羅尼經此陀羅尼經若復有人若自書若教人書如是之人於後不墮地獄不墮餓鬼不墮畜生不墮閻羅王界業道冥官永不於是諸惡道中受其惡報如是之人由是書寫此無量壽決定光明王如來陀羅尼經功德力故於後一切生處生生世世得宿命智此無量壽決定光明王如來陀羅尼經若自書若教人書如是之人則同書寫八萬四千法藏所獲功德而無有異此無量壽決定光明王如來陀羅尼經若復有人若自書若教人書如是之人便同修建八萬四千寶塔所獲功德而無有異此無量壽決定光明王如來陀羅尼經若自書若教人書如是之人若有五無間地獄之業由是功德力故其業皆悉消除此無量壽決定光明王如來陀羅尼經若自書若教人書如是之人不墮魔王及魔眷屬不墮藥叉羅剎道中不墮非橫死亡永不受是諸惡果報此無量壽決定光明王如來陀羅尼經若自書若教人書如是之人臨命終時有九十九俱胝佛面現其前來迎是人往生於彼佛國土中汝等勿生疑惑此無量壽決定光明王如來陀羅尼經若自書若教人書如是之人當來永不受其女人之身此無量壽決定光明王如來陀羅尼經若自書若教人書如是之人常得東方彥達嚩主持國天王南方矩伴拏主增長天王西方大龍主廣目天王北方大藥叉主多聞天王密隱其身隨逐衛護若復有人為於此經能以少分財寶布施之者是人便同以三千大千世界滿中金銀琉璃硨磲瑪瑙珊瑚琥珀如是七寶盡持布施若復有人供養此經典者便同供養一切真實法藏若復有人能持上妙七寶供養毗婆尸試棄毗舍浮俱留孫揭諾揭牟尼迦設波釋迦牟尼如來應正等覺所獲福德不能度量知其數量若復有人供養此無量壽決定光明王如來陀羅尼經所獲福德亦復不能度量知其限量又如四大海水充滿其中不能得知一一滴數若復有人書寫供養受持讀誦此無量壽決定光明王如來陀羅尼經所獲福德亦復不能度量知其限數若復有人書寫是無量壽決定光明王如來陀羅尼經處所地位則是成就諸佛真身舍利寶塔應尊重禮拜若有衆生耳聞此陀羅尼者此之衆生永不受飛鳥四足多足異類之身當來速得成就不退轉無上正等菩提若復有人積聚金銀琉璃硨磲瑪瑙珊瑚琥珀如是七寶如妙高山王盡能捨施所獲福德不可度量知其數量若復有人為此無量壽決定光明王如來陀羅尼經而能布施之者所得福德亦復不能度量知其限數若復有人書寫此無量壽決定光明王如來陀羅尼經禮拜供養者如是之人則為禮拜供養十方諸佛剎土一切如來而無有異爾時釋迦牟尼世尊說彼伽他曰修行布施力成就布施力故得成佛若入大悲精室中耳暫聞此陀羅尼設使布施未圓滿是人速證天人師修行持戒力成就持戒力故得成佛若入大悲精室中耳暫聞此陀羅尼設使持戒未圓滿是人速證天人師修行忍辱力成就忍辱力故得成佛若入大悲精室中耳暫聞此陀羅尼設使忍辱未圓滿是人速證天人師修行精進力成就精進力故得成佛若入大悲精室中耳暫聞此陀羅尼設使精進未圓滿是人速證天人師修行禪定力成就禪定力故得成佛若入大悲精室中耳暫聞此陀羅尼設使禪定未圓滿是人速證天人師修行智慧力成就智慧力故得成佛若入大悲精室中耳暫聞此陀羅尼設使智慧未圓滿是人速證天人師佛說是經已諸大苾芻衆及諸菩薩一切世間天人阿素囉彥闥嚩等聞佛所說皆大歡喜信受奉行
